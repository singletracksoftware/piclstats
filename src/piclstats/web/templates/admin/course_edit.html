{% extends "base.html" %}
{% block title %}{{ course.name }} — Admin{% endblock %}
{% block content %}
<div class="max-w-2xl">
    <div class="mb-4"><a href="/admin/courses" class="text-sm text-picl-700 hover:underline">&larr; Courses</a></div>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">{{ course.name }}</h1>
    <p class="text-sm text-gray-500 mb-6">Edit course stats and MS/HS loop details.</p>

    {% if saved %}
    <div class="mb-4 p-3 bg-green-50 border border-green-200 text-green-800 rounded text-sm">Saved.</div>
    {% endif %}

    <form method="post" action="/admin/courses/{{ course.id }}" class="space-y-6">
        <div class="bg-white rounded-lg shadow p-6 border border-gray-200 space-y-4">
            <div class="text-sm font-semibold text-gray-700 uppercase tracking-wide">Course</div>
            <div>
                <label class="block text-xs text-gray-600 mb-1">Location</label>
                <input type="text" name="location" value="{{ course.location or '' }}"
                       class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm">
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-xs text-gray-600 mb-1">Distance (mi)</label>
                    <input type="number" step="0.01" name="distance_miles" value="{{ course.distance_miles or '' }}"
                           class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-600 mb-1">Elevation (ft)</label>
                    <input type="number" step="1" name="elevation_ft" value="{{ course.elevation_ft or '' }}"
                           class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-600 mb-1">Difficulty score</label>
                    <input type="number" step="0.01" name="difficulty_score" value="{{ course.difficulty_score or '' }}"
                           class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm">
                </div>
            </div>
            <div>
                <label class="block text-xs text-gray-600 mb-1">Notes</label>
                <textarea name="notes" rows="3"
                          class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm">{{ course.notes or '' }}</textarea>
            </div>
        </div>

        {% for lp in loops %}
        <div class="bg-white rounded-lg shadow p-6 border border-gray-200 space-y-4">
            <div class="text-sm font-semibold text-gray-700 uppercase tracking-wide">{{ lp.loop_type }} loop</div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs text-gray-600 mb-1">Lap distance (mi)</label>
                    <input type="number" step="0.01" name="{{ lp.loop_type|lower }}_distance_miles"
                           value="{{ lp.distance_miles or '' }}"
                           class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-600 mb-1">Lap elevation (ft)</label>
                    <input type="number" step="1" name="{{ lp.loop_type|lower }}_elevation_ft"
                           value="{{ lp.elevation_ft or '' }}"
                           class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm">
                </div>
            </div>
        </div>
        {% endfor %}

        <div>
            <button type="submit" class="bg-picl-700 hover:bg-picl-800 text-white font-semibold px-4 py-2 rounded-md">Save</button>
        </div>
    </form>
</div>
{% endblock %}
